name: Publish Docker Image

# Docker tag strategy (kept in sync with docs/opstage-ce/docker-deployment
# on xtrape-capsule-site):
#   - On `v*` git tags:
#       ghcr.io/.../xtrape-capsule-ce:<semver>    — e.g. 0.2.0
#       ghcr.io/.../xtrape-capsule-ce:<major>.<minor>  — e.g. 0.2
#       ghcr.io/.../xtrape-capsule-ce:sha-<long>
#
# We intentionally do NOT publish `latest`. Operators should always pin to a
# semver tag (e.g. `0.2.0`) for reproducible deployments. Use `edge` only for
# experimentation against main.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long,prefix=sha-
          labels: |
            org.opencontainers.image.title=Opstage CE
            org.opencontainers.image.description=Lightweight self-hosted control plane for Capsule Services.
            org.opencontainers.image.vendor=Xtrape Capsule contributors
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.url=https://xtrape-com.github.io/xtrape-capsule-site/
            org.opencontainers.image.documentation=https://xtrape-com.github.io/xtrape-capsule-site/opstage-ce/overview
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - name: Record build timestamp
        id: build_meta
        run: echo "build_time=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          # arm64 build via QEMU emulation crashes on pnpm 9.x with
          # "qemu: uncaught target signal 4 (Illegal instruction)".
          # Ship amd64-only for v0.2; re-introduce arm64 when we move
          # to a native arm64 runner or a pnpm version QEMU can emulate
          # cleanly. Tracked as a v0.3 task.
          file: ./deploy/docker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            OPSTAGE_VERSION=${{ steps.meta.outputs.version }}
            OPSTAGE_COMMIT=${{ github.sha }}
            OPSTAGE_BUILD_TIME=${{ steps.build_meta.outputs.build_time }}
          cache-from: type=gha
          cache-to: type=gha,mode=max